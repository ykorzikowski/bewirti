[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.mypy]
python_version = "3.12"
warn_unused_configs = true
exclude = ["^tests/"]
disallow_untyped_defs = false
check_untyped_defs = true

[[tool.mypy.overrides]]
module = ["streamlit", "reportlab.*", "PIL.*", "pypdf.*"]
ignore_missing_imports = true
